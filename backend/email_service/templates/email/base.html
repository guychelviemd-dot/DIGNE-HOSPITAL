  .wrap{max-width:600px;margin:32px auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(30,64,175,.10)}
  .header{background:linear-gradient(135deg,#0a1628 0%,#1d4ed8 100%);padding:32px 40px;text-align:center}
  .header img{width:48px;height:48px;margin-bottom:12px}

  .body p{font-size:15px;line-height:1.7;color:#475569;margin:0 0 16px}

  .footer{background:#f8faff;border-top:1px solid #e2eaf6;padding:20px 40px;text-align:center}
  .footer p{font-size:12px;color:#94a3b8;margin:4px 0}
  .badge{display:inline-block;background:#dcfce7;color:#166534;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
  .alert{background:#fef2f2;border-left:4px solid #dc2626;border-radius:8px;padding:12px 16px;margin:16px 0}
  .alert p{color:#991b1b;font-size:14px;margin:0}

</head>

<div class="wrap">

    <div style="width:52px;height:52px;background:rgba(255,255,255,.15);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:28px">🏥</div>
