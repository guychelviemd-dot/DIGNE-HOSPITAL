server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # TRÈS IMPORTANT : Force le bon type MIME pour le CSS et le JS
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # LA CLÉ DU PROBLÈME : Redirige toutes les sous-routes (comme /patient/accueil) vers l'index.html de Vue
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gestion des erreurs
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}