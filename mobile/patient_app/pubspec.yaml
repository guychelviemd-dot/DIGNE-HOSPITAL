name: patient_app
description: Application Patient — CHU SGHL
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Navigation
  go_router: ^13.0.0
  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  # HTTP
  dio: ^5.4.0
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  # Notifications
  flutter_local_notifications: ^17.0.0
  firebase_messaging: ^14.7.0
  firebase_core: ^2.24.0
  # PDF
  flutter_pdfview: ^1.3.2
  # Date
  intl: ^0.19.0
  # WebSocket / Chat
  web_socket_channel: ^2.4.0
  # Image picker
  image_picker: ^1.0.7
  # Biometric auth
  local_auth: ^2.1.8
  # QR Code
  qr_flutter: ^4.1.0
  # Video call
  agora_rtc_engine: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: SourceSans3
      fonts:
        - asset: assets/fonts/SourceSans3-Regular.ttf
        - asset: assets/fonts/SourceSans3-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SourceSans3-Bold.ttf
          weight: 700
